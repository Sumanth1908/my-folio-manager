<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E7A500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9E6B00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gold-grad)" stroke-width="1" opacity="0.5" />
  
  <!-- Main Icon (Abstract Portfolio/Growth) -->
  <path d="M35 70 L50 30 L65 70" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M43 55 L57 55" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Accent Dots -->
  <circle cx="50" cy="20" r="3" fill="url(#gold-grad)" />
  <circle cx="80" cy="50" r="3" fill="url(#gold-grad)" />
  <circle cx="50" cy="80" r="3" fill="url(#gold-grad)" />
  <circle cx="20" cy="50" r="3" fill="url(#gold-grad)" />
</svg>
